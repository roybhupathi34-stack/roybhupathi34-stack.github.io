<!DOCTYPE html>
<html>
<body>
  <canvas id="gameCanvas" width="800" height="600" style="border:1px solid #000;"></canvas>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    let player = { x: 50, y: 50, speed: 5 };

    function update() {
      // Logic: Move player, check collisions, AI behavior
      player.x += 1; 
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height); // Clear screen
      ctx.fillStyle = "blue";
      ctx.fillRect(player.x, player.y, 30, 30); // Draw player
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop); // Smooth 60fps loop
    }

    gameLoop();
  </script>
</body>
</html>
