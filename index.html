<!DOCTYPE html>
<html>
<head>
    <title>Interactive Web & Burst</title>
    <style>
        body { margin: 0; overflow: hidden; background: #050505; cursor: crosshair; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
let particles = [];

const mouse = { x: null, y: null, radius: 120 };

// Particle Class
class Particle {
    constructor(x, y, isBurst = false) {
        this.x = x || Math.random() * canvas.width;
        this.y = y || Math.random() * canvas.height;
        // Burst particles are faster
        let speedMult = isBurst ? 5 : 1.5;
        this.vx = (Math.random() - 0.5) * speedMult;
        this.vy = (Math.random() - 0.5) * speedMult;
        this.size = isBurst ? 1.5 : 2;
        this.life = isBurst ? 100 : Infinity; // Burst particles eventually disappear
    }

    update() {
        // Repulsion logic: Run away from mouse
        let dx = mouse.x - this.x;
        let dy = mouse.y - this.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        
        if (distance < mouse.radius) {
            let forceX = dx / distance;
            let forceY = dy / distance;
            this.x -= forceX * 2;
            this.y -= forceY * 2;
        }

        this.x += this.vx;
        this.y += this.vy;

        // Bounce off walls
        if (this.x < 0 || this.x > canvas.width) this.vx *= -1;
        if (this.y < 0 || this.y > canvas.height) this.vy *= -1;
        
        if (this.life !== Infinity) this.life--;
    }

    draw() {
        ctx.fillStyle = `rgba(0, 255, 180, ${this.life / 100})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fill();
    }
}

function init() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
    particles = [];
    for (let i = 0; i < 80; i++) particles.push(new Particle());
}

// Click to Burst
window.addEventListener('mousedown', (e) => {
    for (let i = 0; i < 15; i++) {
        particles.push(new Particle(e.x, e.y, true));
    }
});

window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
window.addEventListener('resize', init);

function animate() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    // Filter out "dead" burst particles
    particles = particles.filter(p => p.life > 0);

    for (let i = 0; i < particles.length; i++) {
        particles[i].update();
        particles[i].draw();

        // Draw connections
        for (let j = i + 1; j < particles.length; j++) {
            let dx = particles[i].x - particles[j].x;
            let dy = particles[i].y - particles[j].y;
            let dist = Math.sqrt(dx * dx + dy * dy);

            if (dist < 100) {
                let opacity = 1 - dist / 100;
                ctx.strokeStyle = `rgba(0, 255, 180, ${opacity * 0.5})`;
                ctx.lineWidth = 0.8;
                ctx.beginPath();
                ctx.moveTo(particles[i].x, particles[i].y);
                ctx.lineTo(particles[j].x, particles[j].y);
                ctx.stroke();
            }
        }
    }
    requestAnimationFrame(animate);
}

init();
animate();
</script>
</body>
</html>
